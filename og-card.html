<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0d1117;
    font-family: 'Space Grotesk', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    width: 100%;
    height: 100%;
    padding: 80px 90px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
  }

  /* decorative green line */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 4px;
    background: #00674F;
  }

  .top {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .name {
    font-size: 72px;
    font-weight: 700;
    color: #f0f0f0;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .role {
    font-size: 24px;
    font-weight: 400;
    color: #00674F;
    letter-spacing: 0.01em;
  }

  .bio {
    font-size: 19px;
    color: #8b8b8b;
    line-height: 1.6;
    max-width: 780px;
  }

  .bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .url {
    font-size: 16px;
    color: #555;
    letter-spacing: 0.04em;
    font-weight: 400;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #00674F;
  }
</style>
</head>
<body>
<div class="card">
  <div class="top">
    <div class="name">Cátia Barros</div>
    <div class="role">Jornalista de Dados e Interatividade · Expresso</div>
    <div class="bio">Jornalismo de dados, interativos e newsgames.<br>Acredita que os números, bem ouvidos, contam sempre uma boa história.</div>
  </div>
  <div class="bottom">
    <div class="url">catia.pt</div>
    <div class="dot"></div>
  </div>
</div>
</body>
</html>
